* { margin: 0; padding: 0; box-sizing: border-box; }

#stats { font-size: 13px; color: #94a3b8; display: flex; gap: 16px; }
#stats span { white-space: nowrap; }
#search-box { margin-left: auto; }
#search-box input { padding: 5px 10px; border: 1px solid #475569; border-radius: 4px; background: #334155; color: #f1f5f9; font-size: 13px; width: 220px; }
#freeze-toggle { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #94a3b8; cursor: pointer; white-space: nowrap; user-select: none; }

#search-box input::placeholder { color: #94a3b8; }
#truncation-banner { background: #fef3c7; color: #92400e; padding: 8px 20px; font-size: 13px; font-weight: 500; border-bottom: 1px solid #f59e0b; display: none; flex-shrink: 0; }
#main { display: flex; flex: 1; min-height: 0; }
#graph-container { flex: 1; background: #fff; position: relative; }
#details-panel { width: 380px; min-width: 200px; max-width: 60vw; background: #fff; border-left: 1px solid #e2e8f0; overflow-y: auto; padding: 16px; flex-shrink: 0; position: relative; }
#panel-drag { position: absolute; left: 0; top: 0; bottom: 0; width: 5px; cursor: col-resize; background: transparent; z-index: 10; }
#panel-drag:hover, #panel-drag.dragging { background: #3b82f6; }
.detail-header { font-size: 18px; font-weight: 700; margin-bottom: 4px; word-break: break-word; }
.detail-flavor { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 12px; }
.detail-section { margin-bottom: 14px; }
.detail-section h3 { font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; border-bottom: 1px solid #e2e8f0; padding-bottom: 4px; }
.prop-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.prop-table td { padding: 4px 6px; vertical-align: top; border-bottom: 1px solid #f1f5f9; }
.prop-table td:first-child { font-weight: 600; color: #334155; white-space: nowrap; width: 40%; }
.prop-table td:last-child { color: #475569; word-break: break-word; }
.attr-list { margin: 2px 0 0 0; padding-left: 14px; font-size: 12px; color: #64748b; list-style: none; }
.attr-list li::before { content: "·"; margin-right: 4px; font-weight: bold; }
.citation-text { font-size: 12px; color: #64748b; font-style: italic; margin-top: 2px; display: block; padding-left: 6px; border-left: 2px solid #e2e8f0; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; margin-bottom: 4px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.edge-label { font-size: 13px; color: #475569; margin-bottom: 2px; }
.edge-direction { font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 12px; word-break: break-word; }
.empty-state { color: #94a3b8; font-size: 14px; margin-top: 20px; }
.strong-id { font-family: monospace; font-size: 12px; background: #f1f5f9; padding: 1px 4px; border-radius: 2px; }
.alias-tag { display: inline-block; font-size: 12px; background: #e2e8f0; padding: 1px 6px; border-radius: 8px; margin: 1px 2px; }
.timestamp { font-size: 11px; color: #94a3b8; }
.prop-group-header { cursor: pointer; user-select: none; }
.prop-group-header td:first-child::before { content: "▸ "; font-size: 10px; }
.prop-group-header.open td:first-child::before { content: "▾ "; }
.prop-group-header td { background: #f8fafc; }
.prop-group-count { font-size: 11px; color: #94a3b8; font-weight: normal; margin-left: 4px; }
.prop-group-row { display: none; }
.prop-group-row.visible { display: table-row; }
#timeline-bar { background: #1e293b; padding: 8px 20px; display: none; align-items: center; gap: 12px; flex-shrink: 0; border-top: 1px solid #334155; }
#timeline-bar label { font-size: 13px; color: #94a3b8; white-space: nowrap; font-weight: 500; }
#timeline-slider { flex: 1; cursor: pointer; accent-color: #3b82f6; }
#timeline-label { font-size: 13px; color: #f1f5f9; font-family: monospace; white-space: nowrap; min-width: 200px; text-align: right; }
.timeline-range { font-size: 11px; color: #64748b; white-space: nowrap; }
</style>

const PALETTE = [
  "#3b82f6","#ef4444","#10b981","#f59e0b","#8b5cf6",
  "#ec4899","#06b6d4","#f97316","#6366f1","#14b8a6",
  "#e11d48","#84cc16","#a855f7","#0ea5e9","#d946ef",
  "#65a30d","#dc2626","#0891b2","#7c3aed","#ea580c"
];

const flavorColors = {};
let colorIdx = 0;
function getFlavorColor(flavor) {
  if (!flavorColors[flavor]) {
    flavorColors[flavor] = PALETTE[colorIdx % PALETTE.length];
    colorIdx++;
  }
  return flavorColors[flavor];
}

const nodeMap = {};
graphData.nodes.forEach(n => { nodeMap[n.id] = n; });

const visNodes = graphData.nodes.map(n => ({
  id: n.id,
  label: n.name || n.id,
  color: {
    background: getFlavorColor(n.flavor),
    border: getFlavorColor(n.flavor),
    highlight: { background: getFlavorColor(n.flavor), border: "#1e293b" },
    hover: { background: getFlavorColor(n.flavor), border: "#1e293b" }
  },
  font: { color: "#1a1a1a", size: 13 },
  shape: "dot",
  size: 12 + Math.min(n.occurrences * 2, 20),
  title: n.flavor
}));

const visEdges = graphData.edges.map(e => ({
  id: "e" + e.id,
  from: e.source,
  to: e.target,
  label: e.property,
  font: { size: 10, color: "#64748b", strokeWidth: 0 },
  arrows: { to: { enabled: true, scaleFactor: 0.6 } },
  color: { color: "#94a3b8", highlight: "#3b82f6", hover: "#64748b" },
  smooth: { type: "curvedCW", roundness: 0.15 },
  _data: e
}));

const container = document.getElementById("graph-container");
const network = new vis.Network(container, {
  nodes: new vis.DataSet(visNodes),
  edges: new vis.DataSet(visEdges)
}, {
  physics: {
    solver: "forceAtlas2Based",
    forceAtlas2Based: { gravitationalConstant: -40, centralGravity: 0.008, springLength: 120, springConstant: 0.04 },
    stabilization: { iterations: 200, fit: true }
  },
  interaction: { hover: true, tooltipDelay: 200, zoomSpeed: 0.3 },
  layout: { improvedLayout: true }
});

const freezeCb = document.getElementById("freeze-cb");

network.on("stabilizationIterationsDone", function() {
  network.setOptions({ physics: false });
  freezeCb.checked = true;
});

freezeCb.addEventListener("change", function() {
  network.setOptions({ physics: { enabled: !this.checked, stabilization: false } });
});

const statsEl = document.getElementById("stats");
const flavors = [...new Set(graphData.nodes.map(n => n.flavor))].sort();
statsEl.innerHTML = "<span>Nodes: " + graphData.nodes.length + "</span>" +
  "<span>Edges: " + graphData.edges.length + "</span>" +
  "<span>Flavors: " + flavors.join(", ") + "</span>";

function escapeHtml(s) {
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

function formatPropValue(val, valueType) {
  if (valueType !== "float") return escapeHtml(val);
  const num = parseFloat(val);
  if (isNaN(num)) return escapeHtml(val);
  const abs = Math.abs(num);
  if (abs === 0) return "0";
  if (abs >= 1000) return num.toLocaleString("en-US", { maximumFractionDigits: 0 });
  if (abs >= 1) return num.toLocaleString("en-US", { maximumFractionDigits: 2 });
  return num.toLocaleString("en-US", { maximumFractionDigits: 4 });
}

function toggleGroup(gid, header) {
  const rows = document.querySelectorAll("." + gid);
  const open = header.classList.toggle("open");
  rows.forEach(r => r.classList.toggle("visible", open));
}

function renderSummary() {
  let html = "<div class='detail-header'>Graph Summary</div>";
  html += "<div class='detail-section'><h3>Overview</h3>";
  html += "<table class='prop-table'>";
  html += "<tr><td>Nodes</td><td>" + graphData.nodes.length + "</td></tr>";
  html += "<tr><td>Edges</td><td>" + graphData.edges.length + "</td></tr>";
  html += "<tr><td>Flavors</td><td>" + flavors.length + "</td></tr>";
  html += "</table></div>";

  html += "<div class='detail-section'><h3>Flavor Legend</h3>";
  flavors.forEach(f => {
    html += "<div class='legend-item'><div class='legend-dot' style='background:" + getFlavorColor(f) + "'></div>" + escapeHtml(f) + "</div>";
  });
  html += "</div>";

  const isolated = graphData.nodes.filter(n => {
    return !graphData.edges.some(e => e.source === n.id || e.target === n.id);
  });
  if (isolated.length > 0) {
    html += "<div class='detail-section'><h3>Isolated Nodes (" + isolated.length + ")</h3>";
    isolated.forEach(n => {
      html += "<div style='font-size:13px;margin-bottom:2px'>" + escapeHtml(n.name) + " <span style='color:#94a3b8'>(" + escapeHtml(n.flavor) + ")</span></div>";
    });
    html += "</div>";
  }

  html += "<p class='empty-state'>Click a node or edge for details.</p>";
  return html;
}

function renderNode(n) {
  const color = getFlavorColor(n.flavor);
  let html = "<div class='detail-header'>" + escapeHtml(n.name) + "</div>";
  html += "<div class='detail-flavor' style='background:" + color + "'>" + escapeHtml(n.flavor) + "</div>";

  if (n.occurrences > 1) {
    html += "<div style='font-size:12px;color:#64748b;margin-bottom:8px'>Appears in " + n.occurrences + " records</div>";
  }

  if (n.strong_ids && n.strong_ids.length > 0) {
    html += "<div class='detail-section'><h3>Strong IDs</h3>";
    html += "<table class='prop-table'>";
    n.strong_ids.forEach(sid => {
      html += "<tr><td>" + escapeHtml(sid.property || "(default)") + "</td><td><span class='strong-id'>" + escapeHtml(sid.value) + "</span></td></tr>";
    });
    html += "</table></div>";
  }

  if (n.aliases && n.aliases.length > 0) {
    html += "<div class='detail-section'><h3>Aliases</h3>";
    n.aliases.forEach(a => { html += "<span class='alias-tag'>" + escapeHtml(a) + "</span>"; });
    html += "</div>";
  }

  if (n.properties && n.properties.length > 0) {
    
    const groups = {};
    const groupOrder = [];
    n.properties.forEach(p => {
      if (!groups[p.name]) { groups[p.name] = []; groupOrder.push(p.name); }
      groups[p.name].push(p);
    });
    
    Object.values(groups).forEach(g => {
      if (g.length > 1) g.sort((a, b) => (b.timestamp || "").localeCompare(a.timestamp || ""));
    });
    const uniqueProps = groupOrder.length;
    html += "<div class='detail-section'><h3>Properties (" + n.properties.length + " values, " + uniqueProps + " unique)</h3>";
    html += "<table class='prop-table'>";
    let groupIdx = 0;
    groupOrder.forEach(name => {
      const vals = groups[name];
      const gid = "pg" + groupIdx++;
      if (vals.length === 1) {
        const p = vals[0];
        html += "<tr><td>" + escapeHtml(p.name) + "</td><td>" + formatPropValue(p.value, p.value_type);
        if (p.timestamp) html += " <span class='timestamp'>" + escapeHtml(p.timestamp) + "</span>";
        if (p.attributes && p.attributes.length > 0) {
          html += "<ul class='attr-list'>";
          p.attributes.forEach(a => { html += "<li>" + escapeHtml(a.name) + ": " + escapeHtml(a.value) + "</li>"; });
          html += "</ul>";
        }
        if (p.citations && p.citations.length > 0) {
          p.citations.forEach(c => { html += "<span class='citation-text'>" + escapeHtml(c) + "</span>"; });
        }
        html += "</td></tr>";
      } else {
        html += "<tr class='prop-group-header' onclick=\"toggleGroup('" + gid + "',this)\"><td>" + escapeHtml(name) + "<span class='prop-group-count'>(" + vals.length + " values)</span></td><td><span class='timestamp'>click to expand time series</span></td></tr>";
        vals.forEach((p, i) => {
          html += "<tr class='prop-group-row " + gid + "'><td style='padding-left:20px;font-weight:normal;color:#64748b'>" + (p.timestamp ? escapeHtml(p.timestamp) : "#" + (i+1)) + "</td><td>" + formatPropValue(p.value, p.value_type);
          if (p.attributes && p.attributes.length > 0) {
            html += "<ul class='attr-list'>";
            p.attributes.forEach(a => { html += "<li>" + escapeHtml(a.name) + ": " + escapeHtml(a.value) + "</li>"; });
            html += "</ul>";
          }
          if (p.citations && p.citations.length > 0) {
            p.citations.forEach(c => { html += "<span class='citation-text'>" + escapeHtml(c) + "</span>"; });
          }
          html += "</td></tr>";
        });
      }
    });
    html += "</table></div>";
  }

  const outEdges = graphData.edges.filter(e => e.source === n.id);
  const inEdges = graphData.edges.filter(e => e.target === n.id);

  if (outEdges.length > 0) {
    html += "<div class='detail-section'><h3>Outgoing Relationships (" + outEdges.length + ")</h3>";
    outEdges.forEach(e => {
      const tn = nodeMap[e.target];
      html += "<div class='edge-label'>" + escapeHtml(e.property) + " → " + escapeHtml(tn ? tn.name : e.target) + "</div>";
    });
    html += "</div>";
  }
  if (inEdges.length > 0) {
    html += "<div class='detail-section'><h3>Incoming Relationships (" + inEdges.length + ")</h3>";
    inEdges.forEach(e => {
      const sn = nodeMap[e.source];
      html += "<div class='edge-label'>" + escapeHtml(sn ? sn.name : e.source) + " → " + escapeHtml(e.property) + "</div>";
    });
    html += "</div>";
  }

  return html;
}

function renderEdge(e) {
  const sn = nodeMap[e.source];
  const tn = nodeMap[e.target];
  let html = "<div class='detail-header'>" + escapeHtml(e.property) + "</div>";
  html += "<div class='edge-direction'>" + escapeHtml(sn ? sn.name : e.source) + " → " + escapeHtml(tn ? tn.name : e.target) + "</div>";

  if (e.timestamp) {
    html += "<div style='font-size:12px;color:#94a3b8;margin-bottom:8px'>" + escapeHtml(e.timestamp) + "</div>";
  }

  if (e.attributes && e.attributes.length > 0) {
    html += "<div class='detail-section'><h3>Attributes</h3>";
    html += "<table class='prop-table'>";
    e.attributes.forEach(a => {
      html += "<tr><td>" + escapeHtml(a.name) + "</td><td>" + escapeHtml(a.value) + "</td></tr>";
    });
    html += "</table></div>";
  }

  if (e.citations && e.citations.length > 0) {
    html += "<div class='detail-section'><h3>Citations</h3>";
    e.citations.forEach(c => { html += "<span class='citation-text'>" + escapeHtml(c) + "</span>"; });
    html += "</div>";
  }

  return html;
}


(function() {
  const panel = document.getElementById("details-panel");
  const drag = document.getElementById("panel-drag");
  let startX, startW;
  drag.addEventListener("mousedown", function(e) {
    e.preventDefault();
    startX = e.clientX;
    startW = panel.offsetWidth;
    drag.classList.add("dragging");
    function onMove(e) { panel.style.width = Math.max(200, startW - (e.clientX - startX)) + "px"; }
    function onUp() { drag.classList.remove("dragging"); document.removeEventListener("mousemove", onMove); document.removeEventListener("mouseup", onUp); }
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });
})();

const detailsEl = document.getElementById("details");
detailsEl.innerHTML = renderSummary();

network.on("click", function(params) {
  if (params.nodes.length > 0) {
    const n = nodeMap[params.nodes[0]];
    if (n) { detailsEl.innerHTML = renderNode(n); return; }
  }
  if (params.edges.length > 0) {
    const edgeId = params.edges[0];
    const visEdge = visEdges.find(e => e.id === edgeId);
    if (visEdge && visEdge._data) { detailsEl.innerHTML = renderEdge(visEdge._data); return; }
  }
  detailsEl.innerHTML = renderSummary();
});

const PROP_SEARCH_MAX = 50;

function renderPropertySearch(q, nodes) {
  const propMatches = [];
  nodes.forEach(n => {
    if (!n.properties) return;
    n.properties.forEach(p => {
      if (p.name.toLowerCase().includes(q)) {
        propMatches.push({ node: n, prop: p });
      }
    });
  });
  if (propMatches.length === 0) return null;

  const byProp = {};
  propMatches.forEach(m => {
    if (!byProp[m.prop.name]) byProp[m.prop.name] = [];
    byProp[m.prop.name].push(m);
  });

  const totalEntities = new Set(propMatches.map(m => m.node.id)).size;
  let html = "<div class='detail-header'>Property Search: " + escapeHtml(q) + "</div>";
  html += "<div style='font-size:13px;color:#64748b;margin-bottom:12px'>" + propMatches.length + " values across " + totalEntities + " entities</div>";

  let shown = 0;
  Object.keys(byProp).sort().forEach(propName => {
    if (shown >= PROP_SEARCH_MAX) return;
    const matches = byProp[propName];
    html += "<div class='detail-section'><h3>" + escapeHtml(propName) + " (" + matches.length + ")</h3>";
    html += "<table class='prop-table'>";
    const sorted = matches.sort((a, b) => a.node.name.localeCompare(b.node.name));
    const toShow = sorted.slice(0, PROP_SEARCH_MAX - shown);
    toShow.forEach(m => {
      html += "<tr><td>" + escapeHtml(m.node.name) + " <span style='color:#94a3b8;font-weight:normal'>(" + escapeHtml(m.node.flavor) + ")</span></td><td>" + formatPropValue(m.prop.value, m.prop.value_type);
      if (m.prop.timestamp) html += " <span class='timestamp'>" + escapeHtml(m.prop.timestamp) + "</span>";
      if (m.prop.attributes && m.prop.attributes.length > 0) {
        html += "<ul class='attr-list'>";
        m.prop.attributes.forEach(a => { html += "<li>" + escapeHtml(a.name) + ": " + escapeHtml(a.value) + "</li>"; });
        html += "</ul>";
      }
      html += "</td></tr>";
      shown++;
    });
    if (toShow.length < matches.length) {
      html += "<tr><td colspan='2' style='color:#94a3b8;font-style:italic'>... " + (matches.length - toShow.length) + " more</td></tr>";
    }
    html += "</table></div>";
  });
  if (shown >= PROP_SEARCH_MAX) {
    html += "<div style='color:#94a3b8;font-size:13px;font-style:italic;margin-top:8px'>Showing first " + PROP_SEARCH_MAX + " results. Refine your search to see more.</div>";
  }
  return { html: html, nodeIds: [...new Set(propMatches.map(m => m.node.id))] };
}

function renderRelationshipSearch(q) {
  const edgeMatches = graphData.edges.filter(e => e.property.toLowerCase().includes(q));
  if (edgeMatches.length === 0) return null;

  const byProp = {};
  edgeMatches.forEach(e => {
    if (!byProp[e.property]) byProp[e.property] = [];
    byProp[e.property].push(e);
  });

  const nodeIds = new Set();
  edgeMatches.forEach(e => { nodeIds.add(e.source); nodeIds.add(e.target); });

  let html = "<div class='detail-header'>Relationship Search: " + escapeHtml(q) + "</div>";
  html += "<div style='font-size:13px;color:#64748b;margin-bottom:12px'>" + edgeMatches.length + " relationships across " + nodeIds.size + " entities</div>";

  let shown = 0;
  Object.keys(byProp).sort().forEach(prop => {
    if (shown >= PROP_SEARCH_MAX) return;
    const edges = byProp[prop];
    html += "<div class='detail-section'><h3>" + escapeHtml(prop) + " (" + edges.length + ")</h3>";
    html += "<table class='prop-table'>";
    const toShow = edges.slice(0, PROP_SEARCH_MAX - shown);
    toShow.forEach(e => {
      const sn = nodeMap[e.source];
      const tn = nodeMap[e.target];
      const srcName = sn ? sn.name : e.source;
      const tgtName = tn ? tn.name : e.target;
      html += "<tr><td>" + escapeHtml(srcName) + "</td><td> → " + escapeHtml(tgtName);
      if (e.attributes && e.attributes.length > 0) {
        html += "<ul class='attr-list'>";
        e.attributes.forEach(a => { html += "<li>" + escapeHtml(a.name) + ": " + escapeHtml(a.value) + "</li>"; });
        html += "</ul>";
      }
      html += "</td></tr>";
      shown++;
    });
    if (toShow.length < edges.length) {
      html += "<tr><td colspan='2' style='color:#94a3b8;font-style:italic'>... " + (edges.length - toShow.length) + " more</td></tr>";
    }
    html += "</table></div>";
  });
  if (shown >= PROP_SEARCH_MAX) {
    html += "<div style='color:#94a3b8;font-size:13px;font-style:italic;margin-top:8px'>Showing first " + PROP_SEARCH_MAX + " results. Refine your search to see more.</div>";
  }
  return { html: html, nodeIds: [...nodeIds] };
}

let searchTimer = null;
const searchInput = document.getElementById("search");
searchInput.addEventListener("input", function() {
  clearTimeout(searchTimer);
  const q = this.value.toLowerCase().trim();
  if (!q) {
    network.unselectAll();
    detailsEl.innerHTML = renderSummary();
    return;
  }
  searchTimer = setTimeout(function() {
    const nameMatching = graphData.nodes.filter(n =>
      n.name.toLowerCase().includes(q) || n.flavor.toLowerCase().includes(q)
    );

    const propResult = renderPropertySearch(q, graphData.nodes);
    const relResult = renderRelationshipSearch(q);

    const allIds = new Set(nameMatching.map(n => n.id));
    if (propResult) propResult.nodeIds.forEach(id => allIds.add(id));
    if (relResult) relResult.nodeIds.forEach(id => allIds.add(id));

    if (allIds.size > 0) {
      const ids = [...allIds];
      network.selectNodes(ids);
      if (ids.length <= 50) {
        network.fit({ nodes: ids, animation: false });
      }
    }

    let resultHtml = "";
    if (propResult) resultHtml += propResult.html;
    if (relResult) resultHtml += (resultHtml ? "<hr style='border:none;border-top:1px solid #e2e8f0;margin:16px 0'>" : "") + relResult.html;

    if (resultHtml) {
      detailsEl.innerHTML = resultHtml;
    } else if (nameMatching.length === 1) {
      detailsEl.innerHTML = renderNode(nameMatching[0]);
    }
  }, 250);
});




(function() {
  var minTime = Infinity, maxTime = -Infinity;
  graphData.nodes.forEach(function(n) {
    (n.properties || []).forEach(function(p) {
      if (p.timestamp) {
        var t = new Date(p.timestamp).getTime();
        if (t < minTime) minTime = t;
        if (t > maxTime) maxTime = t;
      }
    });
  });
  graphData.edges.forEach(function(e) {
    if (e.timestamp) {
      var t = new Date(e.timestamp).getTime();
      if (t < minTime) minTime = t;
      if (t > maxTime) maxTime = t;
    }
  });

  if (minTime === Infinity || minTime === maxTime) return;

  var nodeBirth = {};
  graphData.nodes.forEach(function(n) {
    var earliest = Infinity;
    (n.properties || []).forEach(function(p) {
      if (p.timestamp) {
        var t = new Date(p.timestamp).getTime();
        if (t < earliest) earliest = t;
      }
    });
    nodeBirth[n.id] = earliest === Infinity ? null : earliest;
  });
  graphData.edges.forEach(function(e) {
    if (!e.timestamp) return;
    var t = new Date(e.timestamp).getTime();
    [e.source, e.target].forEach(function(nid) {
      var cur = nodeBirth[nid];
      if (cur === null || cur === undefined || t < cur) nodeBirth[nid] = t;
    });
  });

  var edgeTimeMap = {};
  graphData.edges.forEach(function(e) {
    edgeTimeMap[e.id] = e.timestamp ? new Date(e.timestamp).getTime() : null;
  });

  var bar = document.getElementById("timeline-bar");
  var slider = document.getElementById("timeline-slider");
  var label = document.getElementById("timeline-label");
  var rangeMinEl = document.getElementById("timeline-range-min");
  var rangeMaxEl = document.getElementById("timeline-range-max");

  bar.style.display = "flex";
  slider.min = minTime;
  slider.max = maxTime;
  slider.value = maxTime;

  function fmtDate(ms) { return new Date(ms).toISOString().substring(0, 10); }
  function fmtDateTime(ms) { return new Date(ms).toISOString().replace("T", " ").substring(0, 19) + "Z"; }

  rangeMinEl.textContent = fmtDate(minTime);
  rangeMaxEl.textContent = fmtDate(maxTime);
  label.textContent = fmtDateTime(maxTime);

  var nodesDS = network.body.data.nodes;
  var edgesDS = network.body.data.edges;

  var rafId = null;
  slider.addEventListener("input", function() {
    if (rafId) cancelAnimationFrame(rafId);
    var cutoff = parseInt(this.value);
    label.textContent = fmtDateTime(cutoff);
    rafId = requestAnimationFrame(function() {
      rafId = null;

      var visibleNodes = {};
      var visNodeCount = 0;
      var nodeUpdates = [];
      graphData.nodes.forEach(function(n) {
        var birth = nodeBirth[n.id];
        var vis = birth === null || birth <= cutoff;
        if (vis) { visibleNodes[n.id] = true; visNodeCount++; }
        nodeUpdates.push({ id: n.id, hidden: !vis });
      });
      nodesDS.update(nodeUpdates);

      var visEdgeCount = 0;
      var edgeUpdates = [];
      visEdges.forEach(function(ve) {
        var eData = ve._data;
        var et = edgeTimeMap[eData.id];
        var timeOk = et === null || et <= cutoff;
        var endpointsOk = visibleNodes[eData.source] && visibleNodes[eData.target];
        var show = timeOk && endpointsOk;
        if (show) visEdgeCount++;
        edgeUpdates.push({ id: ve.id, hidden: !show });
      });
      edgesDS.update(edgeUpdates);

      statsEl.innerHTML = "<span>Nodes: " + visNodeCount + " / " + graphData.nodes.length + "</span>" +
        "<span>Edges: " + visEdgeCount + " / " + graphData.edges.length + "</span>" +
        "<span>Flavors: " + flavors.join(", ") + "</span>";
    });
  });
})();
